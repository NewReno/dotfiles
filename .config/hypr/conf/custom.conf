# -----------------------------------------------------
# Custom Hyprland Configuration
# -----------------------------------------------------

# -----------------------------------------------------
# Float + center common dialog windows
# -----------------------------------------------------
windowrule {
    name = xdg-desktop-portal-gtk
    match:class = (.*xdg-desktop-portal-gtk.*)
    float = true
    center = true
}

windowrule {
    name = xdg-desktop-portal
    match:class = (.*xdg-desktop-portal.*)
    float = true
    center = true
}

windowrule {
    name = polkit-gnome
    match:class = (.*polkit-gnome-authentication-agent-1.*)
    float = true
    center = true
}

windowrule {
    name = polkit-kde
    match:class = (.*polkit-kde-authentication-agent-1.*)
    float = true
    center = true
}

windowrule {
    name = file-progress
    match:class = (.*file_progress.*)
    float = true
    center = true
}

windowrule {
    name = confirm
    match:class = (.*confirm.*)
    float = true
    center = true
}

windowrule {
    name = dialog
    match:class = (.*dialog.*)
    float = true
    center = true
}

windowrule {
    name = error
    match:class = (.*error.*)
    float = true
    center = true
}

windowrule {
    name = splash
    match:class = (.*splash.*)
    float = true
    center = true
}

windowrule {
    name = Yad
    match:class = (.*Yad.*)
    float = true
    center = true
}

windowrule {
    name = Zenity
    match:class = (.*Zenity.*)
    float = true
    center = true
}

# -----------------------------------------------------
# Float GTK file chooser dialogs
# -----------------------------------------------------
windowrule {
    name = file-open
    match:title = ^([Oo]pen)$
    float = true
    center = true
}

windowrule {
    name = file-save
    match:title = ^([Ss]ave)$
    float = true
    center = true
}

windowrule {
    name = file-save-as
    match:title = ^([Ss]ave [Aa]s)$
    float = true
    center = true
}

windowrule {
    name = file-select
    match:title = ^([Ss]elect)$
    float = true
    center = true
}

windowrule {
    name = file-choose
    match:title = ^([Cc]hoose)$
    float = true
    center = true
}

windowrule {
    name = file-upload
    match:title = ^([Ff]ile [Uu]pload)$
    float = true
    center = true
}

windowrule {
    name = file-picker
    match:title = ^([Ff]ile [Pp]icker)$
    float = true
    center = true
}

# -----------------------------------------------------
# Float common utility windows
# -----------------------------------------------------
windowrule {
    name = Lxappearance
    match:class = (.*Lxappearance.*)
    float = true
    center = true
}

windowrule {
    name = qt6ct
    match:class = (.*qt6ct.*)
    float = true
    center = true
}

windowrule {
    name = qt5ct
    match:class = (.*qt5ct.*)
    float = true
    center = true
}

windowrule {
    name = Arandr
    match:class = (.*Arandr.*)
    float = true
    center = true
}

windowrule {
    name = wdisplays
    match:class = (.*wdisplays.*)
    float = true
    center = true
}

windowrule {
    name = Galculator
    match:class = (.*Galculator.*)
    float = true
    center = true
}

# -----------------------------------------------------
# Float specific apps
# -----------------------------------------------------
windowrule {
    name = KeePassXC
    match:class = (.*org.keepassxc.KeePassXC.*)
    float = true
    center = true
}

windowrule {
    name = qalculate-gtk
    match:class = (.*qalculate-gtk.*)
    float = true
    center = true
}

windowrule {
    name = qalculate-qt
    match:class = (.*qalculate-qt.*)
    float = true
    center = true
}

windowrule {
    name = steam
    match:class = (.*steam.*)
    tile = true
}

# -----------------------------------------------------
# Environment
# -----------------------------------------------------
env = BROWSER,firefox
env = ELECTRON_TRASH,gio
env = NIXOS_OZONE_WL,1
env = MOZ_USE_XINPUT2,1
env = _JAVA_AWT_WM_NONREPARENTING,1

# Quickshell overview blur
layerrule = blur on, match:namespace quickshell:overview-blur
