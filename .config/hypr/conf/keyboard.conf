# -----------------------------------------------------
# Keyboard Layout
# https://wiki.hyprland.org/Configuring/Variables/#input
# -----------------------------------------------------

input {
    kb_layout = us,ru
    kb_variant = 
    kb_model =
    kb_options = grp:alt_shift_toggle
    numlock_by_default = true
    repeat_rate = 30
    repeat_delay = 250
    follow_mouse = 1
    mouse_refocus = false
    touchpad {
        natural_scroll = false
        scroll_factor = 1.0
        disable_while_typing = false
    }
    sensitivity = 0
}
