# -----------------------------------------------------
# General window layout and colors
# name: "Default"
# -----------------------------------------------------

general {
    gaps_in = 3
    gaps_out = 1
    border_size = 2
    col.active_border = rgb(cba6f7)
    col.inactive_border = rgb(1e1e2e)
    layout = dwindle
    resize_on_border = true
}

group {
    col.border_active = rgb(cba6f7)
    col.border_inactive = rgb(1e1e2e)
    col.border_locked_active = rgb(cba6f7)
    col.border_locked_inactive = rgb(1e1e2e)
}

