# Start Listeners
exec-once=~/.config/ml4w/listeners.sh --startall

# Start Polkit
exec-once=/usr/lib/polkit-kde-authentication-agent-1

# Restore Wallpaper
exec-once = ~/.config/ml4w/scripts/ml4w-wallpaper-app --restore

# Autostart script
exec-once = ~/.config/ml4w/scripts/ml4w-autostart

# Load GTK settings
exec-once = ~/.config/hypr/scripts/gtk.sh

# Load Notification Daemon
exec-once = swaync

# Using hypridle to start hyprlock
exec-once = hypridle

# Load cliphist history
exec-once = wl-paste --watch cliphist store

# Start autostart cleanup
exec-once = ~/.config/hypr/scripts/cleanup.sh

# Load configuration from ML4W Hyprland Settings App
exec-once = ~/.config/com.ml4w.hyprlandsettings/hyprctl.sh

# Start Waybar
exec-once = ~/.config/waybar/launch.sh

# Start Quickshell widgets
exec-once = quickshell
