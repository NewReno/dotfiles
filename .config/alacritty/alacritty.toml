[general]
import = ["~/.config/alacritty/themes/current.toml"]
live_config_reload = true
ipc_socket = true

[env]
TERM = "alacritty"

[window]
padding = { x = 4, y = 4 }
dynamic_padding = true
opacity = 0.95
startup_mode = "Maximized"
decorations_theme_variant = "Dark"
dynamic_title = true
resize_increments = true

[scrolling]
history = 100000
multiplier = 3

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font", style = "Bold Italic" }
size = 11
builtin_box_drawing = true

[cursor]
style = { shape = "Beam", blinking = "On" }
vi_mode_style = { shape = "Block", blinking = "Off" }
blink_interval = 500
blink_timeout = 10
unfocused_hollow = true
thickness = 0.15

[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"
save_to_clipboard = true

[terminal]
shell = { program = "/usr/bin/fish", args = ["-l"] }

[mouse]
hide_when_typing = true
bindings = [
    { mouse = "Right", mods = "Control", action = "Paste" },
]

[hints]
enabled = [
    { command = "xdg-open", hyperlinks = true, post_processing = true, persist = false, mouse = { enabled = true }, binding = { key = "O", mods = "Control|Shift" } },
]

[keyboard]
bindings = [
    { key = "N", mods = "Control|Shift", action = "SpawnNewInstance" },
    { key = "W", mods = "Control|Shift", action = "CreateNewWindow" },
    { key = "F", mods = "Control|Shift", action = "SearchForward" },
    { key = "B", mods = "Control|Shift", action = "SearchBackward" },
    { key = "C", mods = "Control|Shift", action = "Copy" },
    { key = "V", mods = "Control|Shift", action = "Paste" },
    { key = "Plus", mods = "Control", action = "IncreaseFontSize" },
    { key = "Minus", mods = "Control", action = "DecreaseFontSize" },
    { key = "Key0", mods = "Control", action = "ResetFontSize" },
    { key = "F11", mods = "None", action = "ToggleFullscreen" },
    { key = "PageUp", mods = "Shift", action = "ScrollPageUp" },
    { key = "PageDown", mods = "Shift", action = "ScrollPageDown" },
]

[debug]
renderer = "None"
prefer_egl = false
log_level = "Warn"
